# Mod metadata for the tribe/land-claiming mod (mod id "pyrrlanta_tribes").
#
# This mod is server-side only: it registers nothing into any game registry and sends no
# custom network payloads, so unmodded clients can connect to a dedicated server running it.
# NeoForge decides client/server compatibility by registry and payload negotiation rather
# than by matching mod lists, so no special "server only" declaration exists (or is needed)
# in this file -- keeping the mod registry-free is what makes it work.
#
# It still loads fine on a client for singleplayer/LAN (the integrated server runs it).
# The Twilight E.G.O. items live in the separate "pyrrlanta" mod (items/ subproject).

# The name of the mod loader type to load - for regular FML @Mod mods it should be javafml
modLoader="javafml" #mandatory

# A version range to match for said mod loader - for regular FML @Mod it will be the FML version. This is currently 2.
loaderVersion="${loader_version_range}" #mandatory

# The license for you mod. This is mandatory metadata and allows for easier comprehension of your redistributive properties.
license="${mod_license}"

[[mods]] #mandatory

# The modid of the mod
modId="${mod_id}" #mandatory

# The version number of the mod
version="${mod_version}" #mandatory

# A display name for the mod
displayName="${mod_name}" #mandatory

# The description text for the mod (multi line!) (#mandatory)
description='''
Pyrrlanta Tribes - a Towny-style tribe and land-claiming system for Minecraft 1.21.1.
Server-side only; unmodded clients can connect.
'''

# The [[mixins]] block declares the mixin config to FML so that it gets loaded.
# Contains the server-side fire-spread guard (FireBlock#tick).
[[mixins]]
config="${mod_id}.mixins.json"

# A dependency - use the . to indicate dependency for a specific modid. Dependencies are optional.
[[dependencies.${mod_id}]] #optional
    modId="neoforge" #mandatory
    type="required" #mandatory
    versionRange="[${neo_version},)" #mandatory
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

# Optional: if BlueMap is present, tribe claims are drawn on the web map. Not required to run.
[[dependencies.${mod_id}]]
    modId="bluemap"
    type="optional"
    ordering="NONE"
    side="SERVER"
